<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Water Bill GK Heights</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

<style>
body { font-family: Arial, sans-serif; padding: 16px; }
button { padding: 8px 10px; margin-top: 4px; }
table { border-collapse: collapse; width: 100%; margin-top: 16px; }
th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
th { background: #f0f0f0; cursor: pointer; }
.paid { background: #c8e6c9; }
.pending { background: #eeeeee; }
.duplicate { background: #ffe0b2; }

.pay-btn {
  border: none;
  border-radius: 6px;
  color: white;
  padding: 6px 8px;
  font-size: 12px;
}
.phonepe { background:#5f259f; }
.upi { background:#0b7a75; }
</style>
</head>

<body>

<h2>Water Bill Reconciliation</h2>

<table id="resultTable">
<thead>
<tr>
<th onclick="sortTable(0)">Flat</th>
<th onclick="sortTable(1)">Bill</th>
<th onclick="sortTable(2)">Payment</th>
<th onclick="sortTable(3)">Status</th>
<th>PayNow</th>
<th>Send Reminder</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

function render(rows) {
    const tbody = document.querySelector("#resultTable tbody");
    tbody.innerHTML = "";

    rows.forEach(r => {
        const tr = document.createElement("tr");

        tr.className =
            r.status.includes("Paid") ? "paid" :
            r.status.includes("Duplicate") ? "duplicate" : "pending";

        const month = "Apr";
        const note = `${month}-${r.flat}`;
        const amountStr = Number(r.amount).toFixed(2);

        const upiId = "gkh37836321839@sbi";

        const upiUrl = `upi://pay?pa=${encodeURIComponent(upiId)}&am=${amountStr}&cu=INR&tn=${encodeURIComponent(note)}`;
        const phonePeUrl = `phonepe://pay?pa=${encodeURIComponent(upiId)}&pn=GKHeights&am=${amountStr}&cu=INR&tn=${encodeURIComponent(note)}`;

        const payCell = `
        <td>
          <div style="display:flex; gap:6px; justify-content:center;">

            <a href="${phonePeUrl}" onclick="setTimeout(()=>alert('If not opened, open PhonePe manually'),1200)">
              <button class="pay-btn phonepe">📱 PP</button>
            </a>

            <a href="${upiUrl}" onclick="setTimeout(()=>alert('If not opened, use any UPI app'),1200)">
              <button class="pay-btn upi">💳 UPI</button>
            </a>

          </div>
        </td>
        `;

        const baseRow = `
        <td>${r.flat}</td>
        <td>${amountStr}</td>
        <td>${r.payment}</td>
        <td>${r.status}</td>
        ${payCell}
        `;

        tr.innerHTML = baseRow + "<td>-</td>";
        tbody.appendChild(tr);
    });
}

// Demo data
render([
  { flat: "101", amount: 439, payment: "-", status: "Pending" },
  { flat: "102", amount: 439, payment: 439, status: "Paid" },
  { flat: "103", amount: 439, payment: "-", status: "Pending" }
]);

function sortTable(col) {
    const table = document.getElementById("resultTable");
    const rows = Array.from(table.rows).slice(1);
    const asc = table.dataset.sort != col;

    rows.sort((a, b) => {
        const A = a.cells[col].innerText;
        const B = b.cells[col].innerText;
        return asc
            ? A.localeCompare(B, undefined, { numeric: true })
            : B.localeCompare(A, undefined, { numeric: true });
    });

    rows.forEach(r => table.appendChild(r));
    table.dataset.sort = asc ? col : "";
}

</script>

</body>
</html>
