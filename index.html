<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Water Bill Reconciliation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 16px; }
button { padding: 8px 12px; margin: 4px; }
table { border-collapse: collapse; width: 100%; margin-top: 16px; }
th, td { border: 1px solid #ccc; padding: 6px; text-align: center; }
th { background: #f0f0f0; cursor: pointer; }
.paid { background: #c8e6c9; }
.pending { background: #eeeeee; }
.duplicate { background: #ffe0b2; }
</style>
</head>
<body>
<h2>Water Bill Reconciliation</h2><label>Water Bill PDF</label> <input type="file" id="billPdf" accept="application/pdf" /><br/> <label>Bank Statement PDF</label> <input type="file" id="bankPdf" accept="application/pdf" /><br/>

<button onclick="reconcile()">Reconcile</button> <button onclick="downloadCSV()">Download CSV</button>

<h3>Reconciliation</h3>
<table id="resultTable">
<thead>
<tr>
<th onclick="sortTable(0)">Flat</th>
<th onclick="sortTable(1)">Bill</th>
<th onclick="sortTable(2)">Payment</th>
<th onclick="sortTable(3)">Status</th>
<th>Override</th>
</tr>
</thead>
<tbody></tbody>
</table><h3>Unmatched Bank Transactions</h3>
<table id="unmatchedTable">
<thead>
<tr>
<th>Amount</th>
<th>Description</th>
</tr>
</thead>
<tbody></tbody>
</table><script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js";

async function extractText(file) {
  const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(i => i.str).join(" ") + "\n";
  }
  return text;
}

function extractBills(text) {
  const regex = /(\d+)\s+(\d{3})\s+[\d\s]+?(\d+\.00)/g;
  const rows = [];
  let m;
  while ((m = regex.exec(text)) !== null) {
    const flat = m[2];
    const amount = parseFloat(m[3]);
    const floor = parseInt(flat[0]);
    const unit = parseInt(flat.slice(1));
    if (floor >= 1 && floor <= 5 && unit >= 1 && unit <= 14) {
      rows.push({ flat, amount });
    }
  }
  return rows;
}

function extractPayments(text) {
  const lines = text.split(/\n+/);
  const payments = [];
  lines.forEach(line => {
    const match = line.match(/(\d+\.\d{2}).*?(CR|CREDIT)/i);
    if (match) {
      payments.push({ amount: parseFloat(match[1]), desc: line });
    }
  });
  return payments;
}

function reconcileRows(bills, payments) {
  const used = new Array(payments.length).fill(false);
  const results = bills.map(b => {
    let payment = "-";
    let status = "Pending";
    for (let i = 0; i < payments.length; i++) {
      if (!used[i] && payments[i].amount === b.amount) {
        used[i] = true;
        payment = b.amount;
        status = "Paid";
        break;
      }
    }
    return { ...b, payment, status };
  });

  const unmatched = payments.filter((p, i) => !used[i]);
  return { results, unmatched };
}

function render(data) {
  const tbody = document.querySelector("#resultTable tbody");
  tbody.innerHTML = "";
  data.results.forEach((r, idx) => {
    const tr = document.createElement("tr");
    tr.className = r.status === "Paid" ? "paid" : "pending";
    tr.innerHTML = `
      <td>${r.flat}</td>
      <td>${r.amount}</td>
      <td>${r.payment}</td>
      <td>${r.status}</td>
      <td><button onclick="overridePaid(${idx})">Override</button></td>`;
    tbody.appendChild(tr);
  });

  const utbody = document.querySelector("#unmatchedTable tbody");
  utbody.innerHTML = "";
  data.unmatched.forEach(u => {
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${u.amount}</td><td>${u.desc}</td>`;
    utbody.appendChild(tr);
  });

  window.currentData = data;
}

function overridePaid(index) {
  const row = window.currentData.results[index];
  row.status = "Paid (Manual)";
  row.payment = row.amount;
  render(window.currentData);
}

async function reconcile() {
  const billFile = document.getElementById("billPdf").files[0];
  const bankFile = document.getElementById("bankPdf").files[0];
  if (!billFile || !bankFile) {
    alert("Upload both PDFs");
    return;
  }

  const billText = await extractText(billFile);
  const bankText = await extractText(bankFile);

  const bills = extractBills(billText);
  const payments = extractPayments(bankText);

  const data = reconcileRows(bills, payments);
  render(data);
}

function sortTable(col) {
  const table = document.getElementById("resultTable");
  const rows = Array.from(table.tBodies[0].rows);
  const asc = table.dataset.sort != col;
  rows.sort((a, b) => {
    const A = a.cells[col].innerText;
    const B = b.cells[col].innerText;
    return asc ? A.localeCompare(B, undefined, {numeric:true})
               : B.localeCompare(A, undefined, {numeric:true});
  });
  rows.forEach(r => table.tBodies[0].appendChild(r));
  table.dataset.sort = asc ? col : "";
}

function downloadCSV() {
  let csv = "Flat,Bill,Payment,Status\n";
  window.currentData.results.forEach(r => {
    csv += `${r.flat},${r.amount},${r.payment},${r.status}\n`;
  });
  const blob = new Blob([csv], { type: "text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "reconciliation.csv";
  a.click();
}
</script></body>
</html>
