<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water Bill Reconciliation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
body{font-family:Arial;padding:12px}
table{border-collapse:collapse;width:100%;margin-top:12px}
th,td{border:1px solid #ccc;padding:6px;text-align:center}
th{background:#f0f0f0;cursor:pointer}
.paid{background:#c8e6c9}
.pending{background:#eee}
</style>
</head>
<body>
<h2>Water Bill Reconciliation</h2>Water Bill PDF:<br> <input type="file" id="billPdf" accept="application/pdf"><br><br>

Bank Statement PDF:<br> <input type="file" id="bankPdf" accept="application/pdf"><br><br>

<button id="reconcileBtn">Reconcile</button>

<h3>Bill vs Payment</h3>
<table id="resultTable">
<thead>
<tr><th>Flat</th><th>Bill</th><th>Payment</th><th>Status</th><th>Override</th></tr>
</thead>
<tbody></tbody>
</table><h3>Unmatched Bank Transactions</h3>
<table id="unmatchedTable">
<thead><tr><th>Amount</th><th>Description</th></tr></thead>
<tbody></tbody>
</table><script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function readPdf(file){
  const data = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data}).promise;
  let text = '';
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(x=>x.str).join(' ') + '\n';
  }
  return text;
}

function parseBills(text){
  const regex = /(\d+)\s+(\d{3})\s+[\d\s]+?(\d+\.00)/g;
  const bills=[];
  let m;
  while((m=regex.exec(text))!==null){
    const flat=m[2];
    const amount=parseFloat(m[3]);
    const floor=parseInt(flat[0]);
    const unit=parseInt(flat.slice(1));
    if(floor>=1 && floor<=5 && unit>=1 && unit<=14){
      bills.push({flat,amount});
    }
  }
  return bills;
}

function parseBank(text){
  const lines=text.split(/\n+/);
  const tx=[];
  lines.forEach(l=>{
    const m=l.match(/(\d+\.\d{2}).*(CR|CREDIT)/i);
    if(m){
      tx.push({amount:parseFloat(m[1]),desc:l});
    }
  });
  return tx;
}

function reconcile(bills,tx){
  const used=new Array(tx.length).fill(false);
  const rows=bills.map(b=>{
    let payment='-';
    let status='Pending';
    for(let i=0;i<tx.length;i++){
      if(!used[i] && tx[i].amount===b.amount){
        used[i]=true;
        payment=b.amount;
        status='Paid';
        break;
      }
    }
    return {...b,payment,status};
  });
  const unmatched=tx.filter((_,i)=>!used[i]);
  return {rows,unmatched};
}

function render(data){
  const tbody=document.querySelector('#resultTable tbody');
  tbody.innerHTML='';
  data.rows.forEach((r,i)=>{
    const tr=document.createElement('tr');
    tr.className=r.status==='Paid'?'paid':'pending';
    tr.innerHTML=`<td>${r.flat}</td><td>${r.amount}</td><td>${r.payment}</td><td>${r.status}</td><td><button onclick="overrideRow(${i})">Override</button></td>`;
    tbody.appendChild(tr);
  });

  const ut=document.querySelector('#unmatchedTable tbody');
  ut.innerHTML='';
  data.unmatched.forEach(u=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${u.amount}</td><td>${u.desc}</td>`;
    ut.appendChild(tr);
  });

  window.currentData=data;
}

function overrideRow(i){
  const r=window.currentData.rows[i];
  r.status='Paid (Manual)';
  r.payment=r.amount;
  render(window.currentData);
}

document.getElementById('reconcileBtn').onclick=async ()=>{
  try{
    const billFile=document.getElementById('billPdf').files[0];
    const bankFile=document.getElementById('bankPdf').files[0];
    if(!billFile||!bankFile){alert('Please upload both PDFs');return}

    const billText=await readPdf(billFile);
    const bankText=await readPdf(bankFile);

    const bills=parseBills(billText);
    const tx=parseBank(bankText);

    const data=reconcile(bills,tx);
    render(data);
  }catch(e){
    alert('Error during reconciliation: '+e.message);
    console.error(e);
  }
};
</script></body>
</html>
